services:
  db:
    image: postgres:16
    container_name: fast-postgres
    environment:
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fast-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build: .
    image: fast-project-img
    container_name: fast-project-ctr
    depends_on:
      - db
      - rabbitmq   # 👈 добавили
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: payments
      DB_PASSWORD: payments
      DB_NAME: payments
      API_KEY: vasxor-fYmgan-giscy2

  consumer:
    build: .
    container_name: fast-consumer
    depends_on:
      - db
      - rabbitmq
    command: python -m src.consumer_main
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: payments
      DB_PASSWORD: payments
      DB_NAME: payments

volumes:
  pgdata: